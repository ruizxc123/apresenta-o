<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #F0F4F8; /* mesma cor do slide para evitar transição brusca */
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #F0F4F8;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin: 0 auto; /* centraliza na viewport caso a tela seja maior */
        }

        /* Blobs com opacidade um pouco mais forte e cores harmoniosas */
        .blob {
            position: absolute;
            background-color: #4FD1C5;
            opacity: 0.2;
            border-radius: 50%;
            z-index: 0;
        }

        .blob-1 {
            width: 520px;
            height: 520px;
            top: -160px;
            left: -160px;
        }

        .blob-2 {
            width: 320px;
            height: 320px;
            bottom: -80px;
            right: -80px;
        }

        .card {
            background: white;
            padding: 56px 48px 48px; /* mais equilibrado */
            border-radius: 32px;      /* bordas mais suaves */
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.05), 0 4px 10px rgba(79, 209, 197, 0.1);
            text-align: center;
            z-index: 1;
            max-width: 900px;
            width: fit-content;
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            color: #1A202C;           /* tom mais escuro para melhor contraste */
            margin-bottom: 16px;
            line-height: 1.1;
            letter-spacing: -0.02em;  /* leve ajuste para títulos grandes */
        }

        h2 {
            font-size: 32px;
            font-weight: 600;
            color: #2D3748;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 20px;
            color: #4A5568;
        }

        .info p {
            margin: 0;                /* remove espaços extras dos parágrafos */
        }

        .prof {
            font-weight: 800;
            color: #2D3748;
            margin-top: 4px;          /* separação sutil */
        }

        .students-tag {
            position: absolute;
            bottom: 28px;
            right: 40px;
            background-color: #4FD1C5;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 8px 18px rgba(79, 209, 197, 0.4);
            z-index: 2;                /* garante que fique acima de qualquer elemento */
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px); /* efeito moderno opcional */
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="card">
            <h1>Verbos de Ligação</h1>
            <h2>A Ponte entre o Sujeito e o Estado</h2>
            <div class="info">
                <p>Disciplina: Língua Portuguesa</p>
                <p class="prof">Professora: Joana</p>
            </div>
        </div>

        <div class="students-tag">
            Rui Ferreira • Pedro Henrique • Ezequiel Rocha
        </div>
    </div>
</body>
</html>
